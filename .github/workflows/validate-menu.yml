name: Validar cardápio

# CI: garante que data/menu.json continua íntegro a cada alteração.
on:
  push:
    paths: ['data/**', 'build/**']
  pull_request:
    paths: ['data/**', 'build/**']

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validar integridade de todos os cardápios
        run: |
          for slug in $(node -e "console.log(require('./data/menus.json').menus.map(m=>m.slug).join(' '))"); do
            echo "== $slug =="
            node build/menu.mjs validar --menu "$slug"
          done
      - name: Conferir que todos geram
        run: node build/build.mjs
