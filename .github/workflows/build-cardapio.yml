name: Gerar cardápio (HTML + PDF)

# Após qualquer alteração nos dados/gerador (inclusive salvas pelo painel web),
# regenera cardapio.html e cardapio.pdf e faz commit de volta no repositório.
on:
  workflow_dispatch:
  push:
    paths:
      - 'data/**'
      - 'build/**'
      - 'assets/logo-pedemanga.png'

permissions:
  contents: write

concurrency:
  group: build-cardapio-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund

      - name: Instalar Chrome (para o PDF)
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Gerar HTML (todos os cardápios)
        run: node build/build.mjs

      - name: Renderizar PDFs
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: node build/render.mjs

      - name: Gerar menu de evento (Almoço/Jantar)
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: node build/evento.mjs

      - name: Gerar menu de evento (Happy Hour)
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: node build/evento-opcoes.mjs happy-hour

      - name: Gerar cardápio Nômade
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: node build/nomade.mjs

      - name: Gerar eventos Nômade (Happy Hour + Almoço/Jantar)
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          node build/evento-opcoes.mjs nomade-happy-hour
          node build/evento.mjs nomade-almoco-jantar

      - name: Commit dos resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output
          if git diff --cached --quiet; then
            echo "Nada a commitar — cardápios já atualizados."
          else
            git commit -m "chore: regenera cardápios a partir dos dados [skip ci]"
            git push
          fi
